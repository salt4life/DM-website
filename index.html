<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Reference — DM Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0c0a;
    --bg2:       #13120f;
    --bg3:       #1a1813;
    --bg4:       #211f19;
    --border:    rgba(180,160,100,0.12);
    --border2:   rgba(180,160,100,0.22);
    --gold:      #c9a84c;
    --gold-dim:  #7a6530;
    --text:      #e8dfc8;
    --text-dim:  #8a7f68;
    --text-muted:#4a4535;
    --elari:     #4caf72;
    --frosthold: #5bc4e8;
    --obsidian:  #e05555;
    --concordat: #c07fe0;
    --drowned:   #7b8de0;
    --radius:    8px;
  }

  html { font-size: 15px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border2);
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 58px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: .08em;
    white-space: nowrap;
  }
  header .divider { width: 1px; height: 28px; background: var(--border2); }
  nav { display: flex; gap: 4px; }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: .06em;
    color: var(--text-dim); padding: 6px 14px; border-radius: var(--radius);
    transition: all .15s;
  }
  .nav-btn:hover { color: var(--text); background: var(--bg4); }
  .nav-btn.active { color: var(--gold); background: var(--bg4); border: 1px solid var(--border2); }
  .party-badge {
    margin-left: auto; font-family: 'Cinzel', serif; font-size: 11px;
    color: var(--elari); background: rgba(76,175,114,.1); border: 1px solid rgba(76,175,114,.25);
    padding: 4px 12px; border-radius: 20px; letter-spacing: .05em;
  }

  /* ── PANELS ── */
  .panel { display: none; padding: 28px; max-width: 1100px; margin: 0 auto; }
  .panel.active { display: block; }

  /* ── FACTIONS ── */
  .faction-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
  .f-tab {
    font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: .05em;
    padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border2);
    background: var(--bg2); color: var(--text-dim); cursor: pointer; transition: all .15s;
  }
  .f-tab:hover { color: var(--text); border-color: var(--border2); }
  .f-tab.active[data-faction="elari"]     { background: rgba(76,175,114,.15); border-color: var(--elari); color: var(--elari); }
  .f-tab.active[data-faction="frosthold"] { background: rgba(91,196,232,.15); border-color: var(--frosthold); color: var(--frosthold); }
  .f-tab.active[data-faction="obsidian"]  { background: rgba(224,85,85,.15);  border-color: var(--obsidian); color: var(--obsidian); }
  .f-tab.active[data-faction="concordat"] { background: rgba(192,127,224,.15);border-color: var(--concordat); color: var(--concordat); }
  .f-tab.active[data-faction="drowned"]   { background: rgba(123,141,224,.15);border-color: var(--drowned); color: var(--drowned); }

  .faction-card {
    background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; overflow: hidden;
  }
  .faction-header {
    padding: 22px 26px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 16px;
  }
  .faction-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .faction-header h2 {
    font-family: 'Cinzel', serif; font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.2;
  }
  .faction-header .subtitle { font-size: 14px; color: var(--text-dim); font-style: italic; margin-top: 2px; }
  .leader-tag {
    margin-left: auto; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .04em;
    color: var(--text-dim); background: var(--bg4); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 6px; white-space: nowrap; align-self: flex-start;
  }
  .faction-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .f-cell { padding: 16px 26px; border-bottom: 1px solid var(--border); }
  .f-cell:nth-child(odd) { border-right: 1px solid var(--border); }
  .f-label {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 6px;
  }
  .f-value { font-size: 15px; color: var(--text); }
  .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .pill {
    font-size: 12px; padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--border2); color: var(--text-dim);
    font-family: 'Cinzel', serif; letter-spacing: .03em;
  }
  .pill.hot { border-color: rgba(224,85,85,.4); color: #e07070; }
  .locations-row { padding: 16px 26px; border-bottom: 1px solid var(--border); }
  .loc-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .loc-chip {
    font-size: 12px; padding: 4px 10px; border-radius: 6px;
    background: var(--bg4); border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'Cinzel', serif; letter-spacing: .03em;
  }
  .loc-chip.current {
    background: rgba(76,175,114,.12); border-color: rgba(76,175,114,.35);
    color: var(--elari);
  }
  .dm-note {
    padding: 16px 26px; font-size: 14px; color: var(--text-dim); line-height: 1.7;
    border-top: 1px solid var(--border); font-style: italic;
  }
  .dm-note strong { color: var(--gold); font-style: normal; font-weight: 600; }

  /* ── MAP OVERVIEW ── */
  .map-section h3 {
    font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600;
    color: var(--gold); letter-spacing: .08em; margin-bottom: 16px;
  }
  .territory-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .territory-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px;
  }
  .territory-name {
    font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; margin-bottom: 6px;
  }
  .territory-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .territory-locs { margin-top: 8px; font-size: 12px; color: var(--text-muted); }

  /* ── QUEST BOARD ── */
  .quest-board { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .quest-col h3 {
    font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .quest-item {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color .15s;
  }
  .quest-item:hover { border-color: var(--border2); }
  .quest-item.done { opacity: .45; }
  .quest-title { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600; color: var(--text); }
  .quest-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-family: 'Cinzel', serif; letter-spacing: .03em; }
  .quest-body { font-size: 13px; color: var(--text-dim); margin-top: 8px; line-height: 1.6; }
  .quest-status {
    display: inline-block; font-size: 10px; font-family: 'Cinzel', serif; letter-spacing: .08em;
    padding: 2px 8px; border-radius: 4px; margin-top: 8px; text-transform: uppercase;
  }
  .status-active   { background: rgba(76,175,114,.15); color: var(--elari); border: 1px solid rgba(76,175,114,.3); }
  .status-pending  { background: rgba(201,168,76,.1);  color: var(--gold);  border: 1px solid rgba(201,168,76,.2); }
  .status-complete { background: var(--bg4); color: var(--text-muted); border: 1px solid var(--border); }

  .add-quest-btn {
    width: 100%; padding: 10px; background: none; border: 1px dashed var(--border2);
    border-radius: var(--radius); color: var(--text-muted); cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: .05em;
    transition: all .15s; margin-top: 4px;
  }
  .add-quest-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* ── NPC TRACKER ── */
  .npc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .npc-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; transition: border-color .15s;
  }
  .npc-card:hover { border-color: var(--border2); }
  .npc-name { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600; color: var(--text); }
  .npc-faction-tag {
    display: inline-block; font-size: 10px; font-family: 'Cinzel', serif; letter-spacing: .06em;
    padding: 2px 8px; border-radius: 4px; margin: 6px 0 8px; text-transform: uppercase;
  }
  .npc-role { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; font-style: italic; }
  .npc-note { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .npc-attitude {
    margin-top: 10px; font-size: 12px; font-family: 'Cinzel', serif; letter-spacing: .04em;
  }
  .att-friendly { color: var(--elari); }
  .att-neutral  { color: var(--gold); }
  .att-hostile  { color: var(--obsidian); }
  .att-unknown  { color: var(--text-muted); }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 20px;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px;
    padding: 28px; width: 480px; max-width: 95vw;
  }
  .modal h3 { font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold); margin-bottom: 20px; }
  .form-row { margin-bottom: 14px; }
  .form-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--bg4); border: 1px solid var(--border2);
    border-radius: var(--radius); color: var(--text); font-family: 'Crimson Pro', serif;
    font-size: 15px; padding: 8px 12px; outline: none; transition: border-color .15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold-dim); }
  .form-select option { background: var(--bg4); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel {
    background: none; border: 1px solid var(--border2); color: var(--text-dim);
    padding: 8px 18px; border-radius: var(--radius); cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: .05em; transition: all .15s;
  }
  .btn-cancel:hover { border-color: var(--border2); color: var(--text); }
  .btn-save {
    background: rgba(201,168,76,.15); border: 1px solid var(--gold-dim); color: var(--gold);
    padding: 8px 20px; border-radius: var(--radius); cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: .05em; transition: all .15s;
  }
  .btn-save:hover { background: rgba(201,168,76,.25); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>⚔ DM SCREEN</h1>
  <div class="divider"></div>
  <nav>
    <button class="nav-btn active" onclick="showPanel('factions')">Factions</button>
    <button class="nav-btn" onclick="showPanel('map')">Map Overview</button>
    <button class="nav-btn" onclick="showPanel('quests')">Quest Board</button>
    <button class="nav-btn" onclick="showPanel('npcs')">NPCs</button>
  </nav>
  <div class="party-badge">📍 Velmoor's Landing — Elari Dominion</div>
</header>

<!-- FACTIONS PANEL -->
<div class="panel active" id="panel-factions">
  <div class="faction-tabs">
    <button class="f-tab active" data-faction="elari"     onclick="showFaction('elari')">Elari Dominion</button>
    <button class="f-tab"        data-faction="frosthold" onclick="showFaction('frosthold')">Frosthold Dynasty</button>
    <button class="f-tab"        data-faction="obsidian"  onclick="showFaction('obsidian')">Obsidian Throne</button>
    <button class="f-tab"        data-faction="concordat" onclick="showFaction('concordat')">Hallowed Concordat</button>
    <button class="f-tab"        data-faction="drowned"   onclick="showFaction('drowned')">The Drowned Mark</button>
  </div>
  <div id="faction-card"></div>
</div>

<!-- MAP OVERVIEW PANEL -->
<div class="panel" id="panel-map">
  <div class="section-title">Territory Overview</div>
  <div class="territory-list" id="territory-list"></div>

  <div class="section-title">Border Flashpoints</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;" id="flashpoints"></div>
</div>

<!-- QUESTS PANEL -->
<div class="panel" id="panel-quests">
  <div class="quest-board">
    <div>
      <div class="section-title">Active</div>
      <div id="quests-active"></div>
      <button class="add-quest-btn" onclick="openQuestModal()">+ Add Quest</button>
    </div>
    <div>
      <div class="section-title">Leads & Rumours</div>
      <div id="quests-pending"></div>
    </div>
  </div>
</div>

<!-- NPC PANEL -->
<div class="panel" id="panel-npcs">
  <div class="section-title">Known NPCs</div>
  <div class="npc-grid" id="npc-grid"></div>
</div>

<!-- QUEST MODAL -->
<div class="modal-overlay" id="quest-modal">
  <div class="modal">
    <h3>Add Quest</h3>
    <div class="form-row">
      <label class="form-label">Quest Title</label>
      <input class="form-input" id="q-title" placeholder="e.g. Retrieve the Sunken Relic">
    </div>
    <div class="form-row">
      <label class="form-label">Given By</label>
      <input class="form-input" id="q-giver" placeholder="NPC or faction name">
    </div>
    <div class="form-row">
      <label class="form-label">Status</label>
      <select class="form-select" id="q-status">
        <option value="active">Active</option>
        <option value="pending">Lead / Rumour</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="q-notes" placeholder="What do the party know so far?"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeQuestModal()">Cancel</button>
      <button class="btn-save" onclick="saveQuest()">Save Quest</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────

const FACTIONS = {
  elari: {
    name: "Elari Dominion",
    color: "#4caf72",
    gov: "Bureaucratic arcane council",
    exports: "Refined magical tools, leyline crystals, scrolls",
    leader: "Archmagister Vaelion Thorne",
    tensions: ["Frosthold (territory)", "Drowned Mark (crackdowns)"],
    locations: ["Eastbourne","Easthaven","Elmdale","Eastcliff","Welone","A'mlon","Lakefort","Aria","Velmoor's Landing","Adventure Academy","Monastery of Flowers"],
    current: "Velmoor's Landing",
    mapRegion: "Northeast — lush green coastlands and river valleys",
    note: `Your PCs are at <strong>Velmoor's Landing</strong>, a busy port operating under Elari jurisdiction. Ysell Grimwater runs the Drowned Mark here under the Archmagister's nose — a ticking clock if the party causes scenes. Heading north leads toward <strong>Eastbourne and Easthaven</strong>, the northernmost Elari settlements before the Frosthold border around Wakefield and Warlington.`,
  },
  frosthold: {
    name: "Frosthold Dynasty",
    color: "#5bc4e8",
    gov: "Matriarchal monarchy, isolationist",
    exports: "Rare iceglass, runed steel, frost-algae tonics",
    leader: "Queen Irvyelle the Pale-Fanged",
    tensions: ["Elari (leyline expansion)", "Hallowed Concordat (doctrinal disputes)"],
    locations: ["Mammoth Peaks","Edmonton","Freyfrost","Warlington","Wakefield","Aaramor","Cave Crossing"],
    current: null,
    mapRegion: "Northwest — snowfields, glacial peaks, frozen coastline",
    note: `Frosthold controls the icy northwest. <strong>Warlington and Wakefield</strong> sit right on the Elari border — prime flashpoints for leyline disputes. Deeply isolationist; Frosthold traders are rare sights in other lands. The Mammoth Peaks form a natural wall that makes military invasion in either direction very costly.`,
  },
  obsidian: {
    name: "Obsidian Throne",
    color: "#e05555",
    gov: "Autocratic military regime",
    exports: "War-forged arms, infernal ore, spell-bound labor",
    leader: "Regent Korvax the Bound",
    tensions: ["Concordat (holy crusades)", "Everyone else"],
    locations: ["Blackstone","Blackstone Peaks","White Wilds","King's Bay","Valrhim","Litchfield","Rochdale","Oar's Rest","Mount Naggrom"],
    current: null,
    mapRegion: "Southwest — desert wastes, volcanic badlands, rough coast",
    note: `The Obsidian Throne holds the harsh south and southwest. <strong>King's Bay</strong> is their main trade outlet — probably the only place outsiders deal with them safely. 'Spell-bound labor' as an export is sinister; implies enslaved magic-users or bound constructs. Korvax being a <em>Regent</em> implies someone above him — the true ruler may be absent, imprisoned, or dead.`,
  },
  concordat: {
    name: "Hallowed Concordat",
    color: "#c07fe0",
    gov: "Theocratic council guided by oracles",
    exports: "Holy relics, healing draughts, sunsteel",
    leader: "High Oracle Seraphine of the Flame",
    tensions: ["Obsidian Throne (unholy)", "Frosthold (divine disputes)"],
    locations: ["Monastery of Flowers","Nazall Summit","Iredale","Squall's End","Deep Mire"],
    current: null,
    mapRegion: "Southeast — island chains, holy peninsulas, coastal marshes",
    note: `The Concordat's main territory is in the far southeast — islands and coastal lands around <strong>Nazall Summit, Iredale, and Squall's End</strong>. Their presence at the <strong>Monastery of Flowers</strong> (far northeast corner) is geographically isolated and may represent an embassy, mission, or contested sacred site. Sunsteel is their prized export — a holy metal that the Obsidian Throne would desperately want.`,
  },
  drowned: {
    name: "The Drowned Mark",
    color: "#7b8de0",
    gov: "Decentralized criminal syndicate",
    exports: "Contraband, smuggled relics, secrets-for-sale",
    leader: "Ysell Grimwater (unofficial)",
    tensions: ["Elari (crackdowns)", "Concordat (moral opposition)"],
    locations: ["Velmoor's Landing (HQ)","King's Bay","Eastbourne (cell)"],
    current: "Velmoor's Landing (HQ)",
    mapRegion: "No territory — embedded in ports and trade hubs across all factions",
    note: `No borders, no flag — the Drowned Mark operates wherever ships dock. <strong>Velmoor's Landing is their node in Elari territory.</strong> Ysell is described as 'unofficial' leader, implying a higher authority exists. The word <em>Drowned</em> may hint at aquatic origins, sea-god worship, or a specific catastrophic founding event worth exploring.`,
  },
};

const TERRITORIES = [
  { name: "Elari Dominion", color: "#4caf72", desc: "Prosperous arcane state. Leyline researchers, scroll markets, bureaucratic enforcement. Strictly regulated magic.", locs: "Eastbourne, Easthaven, A'mlon, Elmdale, Lakefort, Welone, Eastcliff" },
  { name: "Frosthold Dynasty", color: "#5bc4e8", desc: "Isolationist ice-kingdom. Matriarchal bloodlines, rune-crafted weapons, jealously guarded glacier passes.", locs: "Mammoth Peaks, Freyfrost, Warlington, Edmonton, Wakefield" },
  { name: "Obsidian Throne", color: "#e05555", desc: "Military autocracy in volcanic badlands. Infernal ore mines, enslaved labor, war-economy exports.", locs: "Blackstone, King's Bay, Valrhim, Litchfield, White Wilds" },
  { name: "Hallowed Concordat", color: "#c07fe0", desc: "Oracle-led theocracy on southeastern islands. Holy relics, healing traditions, crusading attitudes toward 'unholy' powers.", locs: "Nazall Summit, Iredale, Squall's End, Deep Mire, Monastery of Flowers" },
  { name: "The Drowned Mark", color: "#7b8de0", desc: "Criminal syndicate with no fixed territory. Embedded in every major port. Trade secrets, contraband, intelligence-for-hire.", locs: "Velmoor's Landing, King's Bay, Eastbourne (suspected cell)" },
  { name: "Neutral / Unclaimed", color: "#7a6530", desc: "The Umalla islands, Turtle Lake region, and central mountains appear unclaimed — potential adventure territory or contested ground.", locs: "Umalla, Turtle Lake, Krueler, Fallrock, Mount Naggrom (border)" },
];

const FLASHPOINTS = [
  { title: "Warlington / Wakefield", factions: "Elari vs Frosthold", desc: "Leyline expansion by Elari encroaches on Frosthold-claimed glacier passes. A diplomatic powder keg." },
  { title: "Velmoor's Landing", factions: "Elari vs Drowned Mark", desc: "Elari jurisdiction hosts the Drowned Mark's main Dominion node. Crackdowns ongoing — Ysell navigates carefully." },
  { title: "King's Bay", factions: "Obsidian Throne / Everyone", desc: "The only major neutral trade point near Obsidian lands. Concordat crusaders have raided it twice." },
];

const NPCS = [
  { name: "Ysell Grimwater", faction: "drowned", role: "Unofficial leader, Drowned Mark", note: "Hired the party at Velmoor's Landing. Wants artifacts retrieved from north of the town. Her 'unofficial' title suggests someone else pulls strings above her.", attitude: "friendly" },
  { name: "Archmagister Vaelion Thorne", faction: "elari", role: "Head of the Elari arcane council", note: "Distant bureaucrat. Would be hostile to the Drowned Mark if he knew Ysell was operating in his port. May become relevant if the party draws Elari attention.", attitude: "neutral" },
  { name: "Queen Irvyelle the Pale-Fanged", faction: "frosthold", role: "Matriarchal ruler of Frosthold", note: "Isolationist. The artifacts heading north may be of Frosthold origin — she may have agents watching.", attitude: "unknown" },
  { name: "Regent Korvax the Bound", faction: "obsidian", role: "Regent of the Obsidian Throne", note: "A regent, not a king — who is he standing in for? His 'Bound' epithet may hint at a magical contract or physical binding.", attitude: "hostile" },
  { name: "High Oracle Seraphine", faction: "concordat", role: "Leader of the Hallowed Concordat", note: "Oracle-guided theocrat. If the artifacts are holy in nature, she may have an interest. The Monastery of Flowers near Velmoor's Landing could be her foothold.", attitude: "unknown" },
];

let customQuests = [];

const BASE_QUESTS = [
  { title: "Retrieve the Northern Artifacts", giver: "Ysell Grimwater", status: "active", notes: "Party tasked with recovering artifacts north of Velmoor's Landing. Nature of artifacts unknown. Location unclear — somewhere past Eastbourne toward the Frosthold border?" },
];

// ── RENDER ──────────────────────────────────────────

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  event.target.classList.add('active');
}

function showFaction(id) {
  const f = FACTIONS[id];
  document.querySelectorAll('.f-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.f-tab[data-faction="${id}"]`).classList.add('active');

  const locs = f.locations.map(l => {
    const cur = l === f.current || (f.current && l.includes(f.current.split(' ')[0]));
    return `<span class="loc-chip${cur ? ' current' : ''}">${l}${cur ? ' ★' : ''}</span>`;
  }).join('');

  const tens = f.tensions.map(t => `<span class="pill hot">${t}</span>`).join('');

  document.getElementById('faction-card').innerHTML = `
    <div class="faction-card">
      <div class="faction-header">
        <div class="faction-dot" style="background:${f.color}"></div>
        <div>
          <h2>${f.name}</h2>
          <div class="subtitle">${f.mapRegion}</div>
        </div>
        <div class="leader-tag">⚜ ${f.leader}</div>
      </div>
      <div class="faction-grid">
        <div class="f-cell">
          <div class="f-label">Government</div>
          <div class="f-value">${f.gov}</div>
        </div>
        <div class="f-cell">
          <div class="f-label">Main Exports</div>
          <div class="f-value">${f.exports}</div>
        </div>
        <div class="f-cell" style="border-bottom:none">
          <div class="f-label">Tensions With</div>
          <div class="pills">${tens}</div>
        </div>
        <div class="f-cell" style="border-bottom:none">
          <div class="f-label">Disposition to Party</div>
          <div class="f-value" style="color:${id === 'drowned' ? '#4caf72' : id === 'obsidian' ? '#e05555' : '#c9a84c'}">${id === 'drowned' ? 'Employer — Friendly' : id === 'obsidian' ? 'Unknown — Potentially Hostile' : 'Neutral / Unaware'}</div>
        </div>
      </div>
      <div class="locations-row">
        <div class="f-label">Key Locations on Map</div>
        <div class="loc-chips">${locs}</div>
      </div>
      <div class="dm-note">${f.note}</div>
    </div>
  `;
}

function renderMap() {
  const tl = document.getElementById('territory-list');
  tl.innerHTML = TERRITORIES.map(t => `
    <div class="territory-card">
      <div class="territory-name" style="color:${t.color}">${t.name}</div>
      <div class="territory-desc">${t.desc}</div>
      <div class="territory-locs">📍 ${t.locs}</div>
    </div>
  `).join('');

  const fp = document.getElementById('flashpoints');
  fp.innerHTML = FLASHPOINTS.map(f => `
    <div class="territory-card">
      <div class="territory-name" style="color:var(--gold)">${f.title}</div>
      <div style="font-size:12px;color:var(--text-muted);font-family:'Cinzel',serif;letter-spacing:.04em;margin-bottom:8px">${f.factions}</div>
      <div class="territory-desc">${f.desc}</div>
    </div>
  `).join('');
}

function renderQuests() {
  const all = [...BASE_QUESTS, ...customQuests];
  const active = all.filter(q => q.status === 'active');
  const pending = all.filter(q => q.status === 'pending');

  const qCard = q => `
    <div class="quest-item">
      <div class="quest-title">${q.title}</div>
      <div class="quest-meta">Given by: ${q.giver}</div>
      ${q.notes ? `<div class="quest-body">${q.notes}</div>` : ''}
      <span class="quest-status status-${q.status}">${q.status === 'active' ? '▶ Active' : '◈ Lead'}</span>
    </div>
  `;

  document.getElementById('quests-active').innerHTML = active.map(qCard).join('') || '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">No active quests.</div>';
  document.getElementById('quests-pending').innerHTML = pending.map(qCard).join('') || '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">No pending leads.</div>';
}

function renderNPCs() {
  const colors = { elari: '#4caf72', frosthold: '#5bc4e8', obsidian: '#e05555', concordat: '#c07fe0', drowned: '#7b8de0' };
  const attLabel = { friendly: '● Friendly', neutral: '◐ Neutral', hostile: '● Hostile', unknown: '? Unknown' };
  const attClass = { friendly: 'att-friendly', neutral: 'att-neutral', hostile: 'att-hostile', unknown: 'att-unknown' };

  document.getElementById('npc-grid').innerHTML = NPCS.map(n => `
    <div class="npc-card">
      <div class="npc-name">${n.name}</div>
      <div class="npc-faction-tag" style="background:${colors[n.faction]}22;border:1px solid ${colors[n.faction]}44;color:${colors[n.faction]}">${FACTIONS[n.faction].name}</div>
      <div class="npc-role">${n.role}</div>
      <div class="npc-note">${n.note}</div>
      <div class="npc-attitude ${attClass[n.attitude]}">${attLabel[n.attitude]}</div>
    </div>
  `).join('');
}

// ── QUEST MODAL ──────────────────────────────────────

function openQuestModal() {
  document.getElementById('quest-modal').classList.add('open');
}
function closeQuestModal() {
  document.getElementById('quest-modal').classList.remove('open');
  document.getElementById('q-title').value = '';
  document.getElementById('q-giver').value = '';
  document.getElementById('q-notes').value = '';
  document.getElementById('q-status').value = 'active';
}
function saveQuest() {
  const title = document.getElementById('q-title').value.trim();
  if (!title) return;
  customQuests.push({
    title,
    giver: document.getElementById('q-giver').value.trim() || 'Unknown',
    status: document.getElementById('q-status').value,
    notes: document.getElementById('q-notes').value.trim(),
  });
  closeQuestModal();
  renderQuests();
}

// close modal on overlay click
document.getElementById('quest-modal').addEventListener('click', function(e) {
  if (e.target === this) closeQuestModal();
});

// ── INIT ──────────────────────────────────────────────
showFaction('elari');
renderMap();
renderQuests();
renderNPCs();
</script>
</body>
</html>
